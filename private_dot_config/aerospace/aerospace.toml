# AeroSpace tiling window manager config
# Docs: https://nikitabobko.github.io/AeroSpace/guide

# Start AeroSpace at login
start-at-login = true

# Normalizations
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Mouse follows focus
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# ── Monitor assignments ──────────────────────────────────────────
# Fallback chains cover multiple setups without per-machine edits:
#   work-main      : DELL (1), Built-in, DELL (2)
#   work-secondary : LG HDR 4K, Built-in
#   home           : DELL S2722QC, Built-in
#   laptop-only    : Built-in Retina Display
# AeroSpace picks the first connected match. Trailing 'main' = whatever's first.
[workspace-to-monitor-force-assignment]
1 = ['DELL S2725QS \(1\)', 'DELL S2722QC', 'LG HDR 4K', 'main']
2 = ['DELL S2725QS \(1\)', 'DELL S2722QC', 'LG HDR 4K', 'main']
3 = ['DELL S2725QS \(1\)', 'DELL S2722QC', 'LG HDR 4K', 'main']
4 = 'Built-in Retina Display'
5 = 'Built-in Retina Display'
6 = 'Built-in Retina Display'
7 = ['DELL S2725QS \(2\)', 'DELL S2722QC', 'LG HDR 4K', 'main']
8 = ['DELL S2725QS \(2\)', 'DELL S2722QC', 'LG HDR 4K', 'main']
9 = ['DELL S2725QS \(2\)', 'DELL S2722QC', 'LG HDR 4K', 'main']

# ── Gaps ─────────────────────────────────────────────────────────
[gaps]
inner.horizontal = 0
inner.vertical = 0
outer.left = 0
outer.bottom = 0
outer.top = 0
outer.right = 0

# ── Main keybindings (alt as modifier) ───────────────────────────
[mode.main.binding]

# Focus windows
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move windows
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Resize windows
alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'

# Layout
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'
alt-f = 'fullscreen'

# Float
alt-shift-f = 'layout floating tiling'

# Join with (use instead of split when normalizations are enabled)
alt-v = 'join-with right'
alt-b = 'join-with down'

# Switch workspaces (force-assignment routes to the correct monitor)
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# Move window to workspace and follow
cmd-alt-1 = ['move-node-to-workspace 1', 'workspace 1']
cmd-alt-2 = ['move-node-to-workspace 2', 'workspace 2']
cmd-alt-3 = ['move-node-to-workspace 3', 'workspace 3']
cmd-alt-4 = ['move-node-to-workspace 4', 'workspace 4']
cmd-alt-5 = ['move-node-to-workspace 5', 'workspace 5']
cmd-alt-6 = ['move-node-to-workspace 6', 'workspace 6']
cmd-alt-7 = ['move-node-to-workspace 7', 'workspace 7']
cmd-alt-8 = ['move-node-to-workspace 8', 'workspace 8']
cmd-alt-9 = ['move-node-to-workspace 9', 'workspace 9']

# Focus monitor
alt-shift-comma  = 'focus-monitor --wrap-around prev'
alt-shift-period = 'focus-monitor --wrap-around next'

# Move window to monitor and follow
alt-shift-p = ['move-node-to-monitor --wrap-around prev', 'focus-monitor --wrap-around prev']
alt-shift-n = ['move-node-to-monitor --wrap-around next', 'focus-monitor --wrap-around next']

# Move entire workspace to monitor
alt-shift-u = 'move-workspace-to-monitor --wrap-around prev'
alt-shift-i = 'move-workspace-to-monitor --wrap-around next'

# Service mode (alt-shift-semicolon to enter, esc to exit)
alt-shift-semicolon = 'mode service'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']

# ── Float specific apps (always on top) ──────────────────────────
[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = 'layout tiling'

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.calculator'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.ActivityMonitor'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.Preview'
run = 'layout floating'
