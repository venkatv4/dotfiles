# ── General ───────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -s escape-time 0
set -g focus-events on
set -g set-clipboard on

# ── Prefix ───────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Splits ───────────────────────────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# ── Pane navigation (emacs mnemonics) ────────────────────────────────
bind b     select-pane -L
bind f     select-pane -R
bind p     select-pane -U
bind n     select-pane -D
bind Left  select-pane -L
bind Down  select-pane -D
bind Up    select-pane -U
bind Right select-pane -R

# ── Window navigation (no prefix, Option=Meta in Ghostty) ────────────
bind -n M-[ previous-window
bind -n M-] next-window

# ── Resize ───────────────────────────────────────────────────────────
bind -r Left  resize-pane -L 5
bind -r Down  resize-pane -D 5
bind -r Up    resize-pane -U 5
bind -r Right resize-pane -R 5

# ── Copy mode (emacs) ────────────────────────────────────────────────
setw -g mode-keys emacs
bind -T copy-mode C-space send -X begin-selection
bind -T copy-mode C-w     send -X copy-pipe-and-cancel
bind -T copy-mode M-w     send -X copy-pipe-and-cancel

# ── Reload ───────────────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── Status bar ───────────────────────────────────────────────────────
set -g status-position top
set -g status-style "bg=default,fg=white"
set -g status-left "#[bold]#S "
set -g status-right "%H:%M"
set -g status-left-length 30

# ── TPM (plugin manager) ────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'

if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm'"
run '~/.tmux/plugins/tpm/tpm'
